    <style>
        /* ESTILO BASE */
        body {
            background-color: #000000;
            background-image: url('MYST1C.jpg'); 
            background-repeat: repeat;
            background-position: center;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.93); 
            z-index: -1;
        }

        /* TÍTULO REDISEÑADO (MÁS ATRACTIVO) */
        header {
            padding: 120px 20px 60px;
            text-align: center;
        }
        h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            font-weight: 900;
        }
        p.subtitle {
            font-size: 1rem;
            color: #00E701;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 15px;
            font-weight: 300;
        }

        /* TARJETAS DE INFLUENCERS */
        .influencers {
            padding: 40px 20px;
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: rgba(15, 15, 15, 0.7);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 30px;
            width: 370px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(12px);
        }
        .card:hover {
            border-color: #00E701;
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .photo-container {
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 16px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .card h3 { margin-bottom: 20px; font-size: 2rem; text-align: center; }

        .social-list { list-style: none; padding: 0; margin: 0; }
        .social-list a { 
            display: flex; align-items: center; text-decoration: none; 
            color: #aaa; margin-bottom: 15px; padding: 10px;
            border-radius: 10px; background: rgba(255,255,255,0.03);
            transition: 0.3s;
        }
        .social-list a:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .social-logo { width: 20px; height: 20px; margin-right: 15px; }

        /* CONTACTO REDISEÑADO (TIPO BOTONES) */
        .contact {
            padding: 100px 20px;
            text-align: center;
            width: 100%;
            max-width: 900px;
        }
        .contact h2 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .contact-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #222;
            padding: 25px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .contact-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
        }
        .contact-item.tg:hover { border-color: #0088cc; box-shadow: 0 0 20px rgba(0, 136, 204, 0.2); }
        .contact-item.ig:hover { border-color: #e1306c; box-shadow: 0 0 20px rgba(225, 48, 108, 0.2); }
        
        .contact-icon-large {
            width: 32px;
            height: 32px;
            margin-bottom: 15px;
            fill: #fff;
        }
        .contact-label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .contact-value { font-weight: 600; font-size: 1.1rem; }
    </style>
</head>
